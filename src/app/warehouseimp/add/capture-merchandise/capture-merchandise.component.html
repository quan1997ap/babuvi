<div style="width: 100%;margin: 0 auto; max-width: 700px;">
  <div class="webcam" *ngIf="currentAction == 'capture' ">
    <webcam [height]="500" [width]="640" [trigger]="triggerObservable" (imageCapture)="handleImage($event)"
      *ngIf="showWebcam" [allowCameraSwitch]="allowCameraSwitch" [switchCamera]="nextWebcamObservable"
      [imageQuality]="1" (cameraSwitched)="cameraWasSwitched($event)" (initError)="handleInitError($event)">
    </webcam>
  </div>
  <div class="view-img" *ngIf="currentAction !== 'capture'">
    <img *ngIf="currentZoomImg && currentZoomImg.imageAsDataUrl" [src]="currentZoomImg.imageAsDataUrl"
      class="zoom-img" />
  </div>
  <br />
  <div class="gr-action-btn">
    <div class="imgs">
      <div class="snapshot" *ngFor="let webcamImage of webcamImages; let i = index;">
        <img [src]="webcamImage.imageAsDataUrl" style="width: 70px" pTooltip="Phóng to"
          (click)="zoomImg(webcamImage)" />
        <span class="remove-btn" pTooltip="Remove Image" (click)="removeImg(i)">
          <i class="pi pi-times"></i>
        </span>
      </div>
    </div>
    <p-button class="continue-capture" *ngIf="currentAction !== 'capture' " pTooltip="Tiếp tục" label="Tiếp tục chụp" (click)="changeAction('capture')">
    </p-button>
    <span>&nbsp;&nbsp;</span>
    <p-button class="toggle-webcam" *ngIf="currentAction == 'capture' " pTooltip="Chuyển Camera" icon="pi pi-refresh" (click)="toggleWebcam()"></p-button>
    <span>&nbsp;&nbsp;</span>
    <p-button label="Chụp" class="p-button-secondary" icon="pi pi-camera" (click)="triggerSnapshot();"></p-button>
    <span>&nbsp;&nbsp;</span>
    <p-button label="onUpload" class="p-button-secondary" (click)="close()"></p-button>
  </div>
  <br />
</div>
<div *ngIf="errors.length > 0">
  <h4>CAMERA ERROR:</h4>
  <ul *ngFor="let error of errors">
    <li>{{error | json}}</li>
  </ul>
</div>
