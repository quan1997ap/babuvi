<div class="page-header">
    <h4 class="title">
        Danh sách người dùng
    </h4>
    <span (click)="toAddForm()">
        Thêm
    </span>
</div>

<div class="w100 tg">
    <div class="table-data">
        <p-table [value]="userList" [paginator]="true" [rows]="10" scrollWidth="calc(100% - 200px)" [scrollable]="true">
            <ng-template pTemplate="caption">
                <div style="padding-left: 20px;">
                    Số người dùng :
                    <span class="no-complaint"> {{userList.length}} </span>
                </div>
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th style="width: 70px;">ID</th>
                    <th style="width: 150px;">Ảnh</th>
                    <th style="width: 150px;">Tên</th>
                    <th style="width: 150px;">Địa chỉ</th>
                    <th style="width: 150px;">Email</th>
                    <th style="width: 150px;">Ngày tạo</th>
                    <th style="width: 50px;"></th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-user>
                <tr>
                    <td style="width: 70px;">{{user.userId}}</td>
                    <td style="width: 150px;">
                        <img *ngIf="user.avatarUrl" [src]="user.avatarUrl" class="avatar-img">
                        <img *ngIf="!user.avatarUrl"
                            src="http://nguyetanh.vn/wp-content/uploads/2015/10/default_avatar.png" class="avatar-img">
                    </td>
                    <td style="width: 150px;">{{user.firstName}} {{user.lastName}}</td>
                    <td style="width: 150px;">{{user.address}}</td>
                    <td style="width: 150px;">{{user.email}}</td>
                    <td style="width: 150px;">{{user.createdDate | date:'dd/MM/yyyy HH:mm:ss' }}</td>
                    <td style="width: 50px;">
                        <span class="edit-user" routerLink="/user-pages/edit-user/{{user.userId}}">Sửa</span>
                    </td>
                </tr>
            </ng-template>
        </p-table>
        <div class="footer" *ngIf="userList.length && userList.length == 0">
            <strong class="no-complaint">
                Chưa có user nào
            </strong>
        </div>
        <div class="footer" *ngIf="msgs && msgs.length > 0">
            <p-messages [(value)]="msgs" [closable]="false" [style]="{'width': '100% !important'}">
            </p-messages>
        </div>
        <!-- <mat-paginator showFirstLastButtons [length]="dataCount" [hidePageSize]="true" [pageSize]="pageSize"
            (page)="pageEvent=getComplaintsByPageIndex($event)"></mat-paginator> -->
    </div>
</div>
