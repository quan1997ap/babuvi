module.exports = "<div style=\"width: 250px; height: 120px;\" >\r\n\r\n    <div mat-dialog-title style=\"margin-top: 10px;\">\r\n        <h4 style=\"border-bottom: 1px solid #d4d4d4;\">\r\n            Bạn có muốn xóa?\r\n        </h4>\r\n    </div>\r\n\r\n    <div mat-dialog-actions class=\"d-block text-right mar-right10\">\r\n        <button mat-raised-button class=\"btn-cancel-actions\" (click)=\"onDismiss()\">\r\n            <mat-icon >close</mat-icon> cancel\r\n        </button>\r\n        <button mat-raised-button class=\"btn-save-actions\" (click)=\"onConfirm()\" cdkFocusInitial>\r\n            <mat-icon>check</mat-icon> đồng ý\r\n        </button>\r\n    </div>\r\n    \r\n  </div>\r\n  "
